services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: musicapp
      MYSQL_USER: musicapp
      MYSQL_PASSWORD: musicapp_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
