spring.application.name=demo

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Tomcat timeout for large uploads (5 minutes)
server.tomcat.connection-timeout=300000
spring.mvc.async.request-timeout=300000

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:musicapp.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Enable WAL mode for better concurrent read/write performance
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL; PRAGMA busy_timeout=5000;

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Import .env file (requires Spring Boot 2.4+)
spring.config.import=optional:file:.env[.properties]

# Security Configuration
jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=604800
jwt.refreshable-duration=31536000
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}

# OAuth2 Client Registration for Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/drive.file


