spring.application.name=MusicApp

server.port=8000

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Tomcat timeout for large uploads (5 minutes)
server.tomcat.connection-timeout=300000
spring.mvc.async.request-timeout=300000

# Upload queue limits: only this many upload jobs can parse metadata/lyrics and push to Drive at once.
app.upload.max-concurrent=${UPLOAD_MAX_CONCURRENT:2}
app.upload.queue-capacity=${UPLOAD_QUEUE_CAPACITY:50}
app.upload.shutdown-await-seconds=${UPLOAD_SHUTDOWN_AWAIT_SECONDS:30}

# Database Configuration (MySQL 8+)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/MusicApp?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema is versioned by Flyway; Hibernate must never mutate a production schema.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Enable response compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain
server.compression.min-response-size=1024

# MySQL pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=20000

# Import .env file via spring-dotenv plugin

# Security Configuration
jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=36000
jwt.refreshable-duration=2592000
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.cookie.secure=${APP_COOKIE_SECURE:true}
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:10000}

# OAuth2 Client Registration for Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/drive.file
