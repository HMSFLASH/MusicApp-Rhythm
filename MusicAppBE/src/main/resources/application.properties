spring.application.name=MusicApp

server.port=8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Tomcat timeout for large uploads (5 minutes)
server.tomcat.connection-timeout=300000
spring.mvc.async.request-timeout=300000

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:musicapp.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Enable WAL mode for better concurrent read/write performance
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL; PRAGMA busy_timeout=5000;

# JPA/Hibernate Properties
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
# Disable show-sql in production to reduce I/O overhead
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Enable response compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain
server.compression.min-response-size=1024

# SQLite optimal: small pool, single writer
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# Import .env file (requires Spring Boot 2.4+)
spring.config.import=optional:file:.env[.properties]

# Security Configuration
jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=36000
jwt.refreshable-duration=2592000
app.frontend-url=${FRONTEND_URL:*}
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}

# OAuth2 Client Registration for Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/drive.file


