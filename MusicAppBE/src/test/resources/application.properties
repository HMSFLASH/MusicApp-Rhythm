spring.datasource.url=jdbc:sqlite:target/test-musicapp.db
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
jwt.signerKey=test-jwt-signer-key-for-context-loads-only
jwt.valid-duration=36000
jwt.refreshable-duration=2592000
app.frontend-url=http://localhost:5173
google.client-id=test-client-id
google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/drive.file
